<!DOCTYPE html>
<html lang='es'>
  <head>
    <meta charset='UTF-8'> 
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>TechStore - Tu tienda de tecnología</title>
    <link rel='stylesheet' href='estilos.css'>
  </head>
 
  <body>
   <header>
      <h1>🖥️TechStore</h1>

      <nav class="navegacion">
        <ul >
          <li class="itemNavegacion"><a  href='index.html'>Inicio</a></li>
          <li class="itemNavegacion"><a href='#producto'>Productos</a></li>
          <li class="itemNavegacion"><a href='#Contacto'>Contacto</a></li>
          <li class="itemNavegacion"><a href='login.html'>Login</a></li>
          <li class="itemNavegacion"><a href='#carrito'>🛒</a></li>
        </ul>
      </nav>
   </header>

      <main>  
        <section id='catalogo'>
          <h2>Catalogo de productos</h2>
          <!-- Buscador por nombre -->
      <div class="campo-busqueda">
        <input type="text" id="buscador" placeholder="Buscar por nombre o marca...">
        <button id="btn-limpiar-busqueda" class="btn-limpiar">✕</button>
      </div>

      <!-- Botones de categoría -->
      <div id="botones-filtro">
        <button class="btn-filtro activo" data-categoria="todos">Todos</button>
        <button class="btn-filtro" data-categoria="notebook">Notebooks</button>
        <button class="btn-filtro" data-categoria="celular">Celulares</button>
        <button class="btn-filtro" data-categoria="auricular">Auriculares</button>
        <button class="btn-filtro" data-categoria="monitor">Monitores</button>
        <button class="btn-filtro" data-categoria="pc_escritorio">PCs</button>
        <button id="btn-limpiar-filtros" class="btn-limpiar-filtros">✕ Limpiar filtros</button>
      </div>
          <div id="productos"></div>
        </section>


        <section id='Ofertas'>
        <h3>Ofertas del mes</h3>
        <article>
          <ul>
            <li class="itemOfertas">20% off en notebooks seleccionadas</li>
            <li class="itemOfertas">Envio gratis en auriculares</li>
            <li class="itemOfertas">3 cuotas sin interes en monitores</li>
          </ul>
        </article>
        </section>
        
      </main>

      <footer>
        <div class="contenedorFooter">
        <h6>Barovero Matias 2026</h6>
        </div>
      </footer>
    <script src='js/app.js'></script>
    <script src='js/producto.js'></script>
  </body>
 
</html>
