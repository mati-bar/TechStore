# ── Servidor ─────────────────────────────────────────────────
server.port=8080

# ── Base de datos H2 en memoria ───────────────────────────────
spring.datasource.url=jdbc:h2:mem:techstoredb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# create-drop: crea las tablas al iniciar y las elimina al apagar
# Así los datos del data.sql se cargan frescos en cada arranque

# ── Consola H2 (para ver la base de datos en el navegador) ────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Acceder en: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:techstoredb  |  User: sa  |  Password: (vacío)

# ── Inicializar datos desde data.sql ─────────────────────────
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Logs ─────────────────────────────────────────────────────
spring.jpa.show-sql=true
# Muestra en la consola de IntelliJ el SQL que ejecuta cada request
# ── Swagger UI ────────────────────────────────────────────────
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
